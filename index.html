<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LetiMail — AI Email Assistant</title>
  <link rel="stylesheet" href="Frontend/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
  <!-- Notification -->
  <div id="notification" class="notification">
    <div class="notification-content">
      <div class="notification-icon"></div>
      <div class="notification-text">
        <div class="notification-title"></div>
        <div class="notification-message"></div>
      </div>
      <button class="notification-close"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <!-- Header -->
  <header class="navbar">
    <div class="nav-container">
      <div class="logo">
        <div class="logo-mark">L</div>
        <div class="logo-text">
          <h1>LetiMail</h1>
          <span class="logo-tagline">Your Voice, AI Powered</span>
        </div>
      </div>
      <div class="nav-actions">
        <div id="userMenu" class="user-menu">
          <button class="user-avatar" id="userAvatar">
            <span id="avatarText">G</span>
          </button>
          <div class="dropdown-menu" id="userDropdown">
            <button id="settingsBtn" class="dropdown-item"><i class="fas fa-cog"></i> Settings</button>
            <button id="clearSessionBtn" class="dropdown-item logout"><i class="fas fa-trash"></i> Clear Session</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Main App -->
  <main class="app-main">
    <div class="app-container">
      <div class="app-header">
        <h1>AI Email Generator</h1>
        <p>Describe what you need, and LetiMail writes it for you</p>
      </div>

      <div class="app-workspace">
        <!-- Input Panel -->
        <div class="input-panel">
          <div class="panel-header">
            <h2>Email Brief</h2>
            <span class="step-indicator">Step 1</span>
          </div>
          <div class="input-group">
            <label><i class="fas fa-briefcase"></i> Business Description</label>
            <textarea id="businessDesc" placeholder="e.g. I run a web design agency..."></textarea>
          </div>
          <div class="input-group">
            <label><i class="fas fa-envelope-open-text"></i> What to communicate</label>
            <textarea id="context" placeholder="e.g. Follow up after a client meeting..."></textarea>
          </div>
          <div class="input-row" style="display:flex; gap:12px">
            <div class="input-group" style="flex:1">
              <label>Tone</label>
              <select id="tone">
                <option value="friendly">Friendly</option>
                <option value="professional">Professional</option>
                <option value="casual">Casual</option>
                <option value="formal">Formal</option>
                <option value="persuasive">Persuasive</option>
              </select>
            </div>
            <div class="input-group" style="flex:1">
              <label>Length</label>
              <select id="emailLength">
                <option value="short">Short</option>
                <option value="medium" selected>Medium</option>
                <option value="long">Long</option>
              </select>
            </div>
          </div>
          <button class="generate-btn" id="generateBtn">
            <span class="btn-icon">✨</span> Generate My Email
          </button>
        </div>

        <!-- Output Panel -->
        <div class="output-panel">
          <div class="panel-header">
            <h2>Your Email</h2>
            <span class="quality-badge">AI Powered</span>
          </div>
          <div id="output" class="output-text">
            <div class="output-placeholder">
              <div class="placeholder-animation">
                <div class="animation-ring"></div>
                <div class="placeholder-icon">✉️</div>
              </div>
              <p>Your email will appear here</p>
            </div>
          </div>
          <div id="actionButtons" class="action-buttons" style="display:none">
            <button id="copyBtn" class="action-btn copy-btn"><i class="far fa-copy"></i> Copy</button>
            <button id="editBtn" class="action-btn edit-btn"><i class="far fa-edit"></i> Edit</button>
            <button id="sendBtn" class="action-btn send-btn"><i class="fas fa-paper-plane"></i> Send</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Settings Modal (hidden by default) -->
  <div id="settingsModal" class="modal-overlay" style="display:none">
    <div class="modal-content">
      <button class="modal-close" id="closeSettingsModal"><i class="fas fa-times"></i></button>
      <h3>Preferences</h3>
      <form id="preferencesForm" class="settings-form">
        <div class="form-group">
          <label>Default Tone</label>
          <select id="defaultTone" class="settings-select">
            <option value="friendly">Friendly</option>
            <option value="professional">Professional</option>
            <option value="casual">Casual</option>
            <option value="formal">Formal</option>
            <option value="persuasive">Persuasive</option>
          </select>
        </div>
        <div class="form-group">
          <label>Email Length</label>
          <select id="defaultEmailLength" class="settings-select">
            <option value="short">Short</option>
            <option value="medium">Medium</option>
            <option value="long">Long</option>
          </select>
        </div>
        <button type="submit" class="settings-btn primary">Save Preferences</button>
      </form>
      <hr style="margin:20px 0; border-color:var(--border-subtle)">
      <button id="clearSessionBtn2" class="settings-btn secondary" style="width:100%">
        <i class="fas fa-trash"></i> Start New Guest Session
      </button>
    </div>
  </div>

  <script src="Frontend/script.js"></script>
</body>
</html>
